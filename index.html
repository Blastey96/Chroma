<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chroma | Professional Painting Suite</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<!-- ag-psd library for PSD import/export support -->
<script src="https://cdn.jsdelivr.net/npm/ag-psd@2.1.25/dist/bundle.js"></script>
<style>
:root {
--bg-main: #0a0a0a;
--bg-panel: rgba(20, 20, 20, 0.95);
--bg-canvas-container: #050505;
--text-main: #e0e0e0;
--text-dim: #9ca3af; /* gray-400 */
--text-header: #6b7280; /* gray-500 */
--border-color: rgba(255, 255, 255, 0.05);
--input-bg: #1a1a1a;
--input-border: #333;
--item-hover: rgba(255, 255, 255, 0.05);
--dot-color: #222;
}
body.light-mode {
--bg-main: #f0f0f0;
--bg-panel: rgba(235, 235, 235, 0.98);
--bg-canvas-container: #d6d6d6;
--text-main: #1a1a1a;
--text-dim: #4b5563; /* gray-600 */
--text-header: #374151; /* gray-700 */
--border-color: rgba(0, 0, 0, 0.1);
--input-bg: #ebebeb;
--input-border: #ccc;
--item-hover: rgba(0, 0, 0, 0.05);
--dot-color: #bbb;
}
body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; user-select: none; transition: background-color 0.3s ease, color 0.3s ease; }
.ui-panel { background: var(--bg-panel); backdrop-filter: blur(20px); border: 1px solid var(--border-color); }
.canvas-container { background-image: radial-gradient(var(--dot-color) 1px, transparent 1px); background-size: 20px 20px; background-color: var(--bg-canvas-container); }
#canvasStack {
position: relative;
box-shadow: 0 0 50px rgba(0,0,0,0.5);
background: white;
cursor: none;
line-height: 0;
transition: transform 0.1s ease-out;
transform-origin: center center;
touch-action: none;
}
#displayCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
#activeStrokeCanvas { display: none; }
.layer-canvas { display: none; }
input[type="range"] { accent-color: #D38E3F; cursor: pointer; }
.layer-item.active { background: rgba(211, 142, 63, 0.1); border: 1px solid rgba(211, 142, 63, 0.4); }
.layer-item.dragging-visual {
background: rgba(211, 142, 63, 0.2) !important;
border: 1px solid #D38E3F !important;
opacity: 0.8;
}
.tool-btn.active { color: #D38E3F; background: rgba(211, 142, 63, 0.1); box-shadow: 0 0 15px rgba(211, 142, 63, 0.2); }
#hsvBox { background: linear-gradient(to bottom, transparent, #000), linear-gradient(to right, #fff, transparent); }
#hueBar { appearance: none; background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f0f); height: 8px; border-radius: 4px; }
#hueBar::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: white; border-radius: 50%; cursor: pointer; border: 1px solid #000; }
.draggable-panel { position: absolute; z-index: 2000; cursor: default; }
.panel-header { cursor: move; }
/* Updated Cursor Canvas to be a fixed overlay on the screen area */
#cursorCanvas { pointer-events: none; z-index: 6000; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
.clipping-indent { margin-left: 12px; border-left: 2px solid #D38E3F; padding-left: 8px; }
.hsb-track { height: 6px; border-radius: 3px; appearance: none; background: var(--input-border); margin: 8px 0; width: 100%; }
.hsb-track::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: var(--text-main); border-radius: 50%; cursor: pointer; }
select { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border); font-size: 9px; padding: 2px 4px; border-radius: 4px; outline: none; }
select:focus { border-color: #D38E3F; }
.layer-opacity-slider { height: 4px; width: 100%; }
/* UI overrides for light mode text */
.light-mode .text-gray-500 { color: var(--text-header); }
.light-mode .text-gray-400 { color: var(--text-dim); }
.light-mode .text-gray-600 { color: var(--text-main); }

.tool-popup {
    display: none;
    position: absolute;
    left: 100%;
    margin-left: 10px;
    background: var(--bg-panel);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 100;
}
.tool-btn:active + .tool-popup, .tool-popup:hover {
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.color-preview-active { border-color: #D38E3F !important; box-shadow: 0 0 10px rgba(211, 142, 63, 0.4) !important; }
</style>
</head>
<body class="flex flex-col h-screen">
<!-- HEADER -->
<header class="h-14 ui-panel flex items-center px-6 justify-between z-50 border-b">
<div class="flex items-center gap-6">
<h1 class="text-[11px] font-black tracking-[0.4em] text-[#D38E3F] uppercase flex items-center gap-2">
<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="transform: rotate(45deg);">
<rect x="10.5" y="16" width="3" height="7" rx="1" />
<rect x="11.5" y="10" width="1" height="6" />
<path d="M12 1L8 6L12 11L16 6Z" />
</svg>
CHROMA
</h1>
<!-- File Operations Icons -->
<div class="flex items-center gap-1 border-l border-white/10 pl-4 h-8">
<button onclick="triggerPsdImport()" class="p-2 text-gray-400 hover:text-purple-400 transition-colors" title="Open PSD">
<i class="fas fa-folder-open"></i>
</button>
<button onclick="savePsd()" class="p-2 text-gray-400 hover:text-blue-400 transition-colors" title="Save PSD">
<i class="fas fa-save"></i>
</button>
<button onclick="exportCanvas()" class="p-2 text-gray-400 hover:text-[#D38E3F] transition-colors" title="Export PNG">
<i class="fas fa-file-export"></i>
</button>
</div>
<div class="flex items-center gap-1 border-l border-white/10 pl-4 h-8">
<button onclick="undo()" class="p-2 text-gray-400 hover:text-[#D38E3F] transition-colors" title="Undo (Ctrl+Z)">
<i class="fas fa-undo-alt"></i>
</button>
<button onclick="redo()" class="p-2 text-gray-400 hover:text-[#D38E3F] transition-colors" title="Redo (Ctrl+Shift+Z)">
<i class="fas fa-redo-alt"></i>
</button>
</div>
<!-- Gradient Specific Options (Hidden by default) -->
<div id="gradientOptions" class="hidden items-center gap-3 border-l border-white/10 pl-6 h-8">
    <div class="flex flex-col">
        <span class="text-[8px] uppercase text-gray-500 font-bold mb-0.5">Gradient Type</span>
        <select id="gradientTypeSelect" onchange="gradientType = this.value">
            <option value="fg-bg">Foreground to Background</option>
            <option value="bg-fg">Background to Foreground</option>
            <option value="fg-trans">Foreground to Transparent</option>
            <option value="bg-trans">Background to Transparent</option>
        </select>
    </div>
</div>
<div class="flex items-center gap-4 border-l border-white/10 pl-6 h-8">
<div class="flex items-center gap-1 bg-black/5 dark:bg-white/5 rounded-lg p-1">
<button onclick="changeZoom(-0.1)" class="w-8 h-6 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 rounded"><i class="fas fa-minus text-[10px]"></i></button>
<span id="zoomVal" class="text-[10px] font-mono w-10 text-center">100%</span>
<button onclick="changeZoom(0.1)" class="w-8 h-6 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 rounded"><i class="fas fa-plus text-[10px]"></i></button>
</div>
<div class="flex items-center gap-1 bg-black/5 dark:bg-white/5 rounded-lg p-1">
<button onclick="changeRotate(-15)" class="w-8 h-6 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 rounded"><i class="fas fa-undo text-[10px]"></i></button>
<span id="rotateVal" class="text-[10px] font-mono w-10 text-center">0°</span>
<button onclick="changeRotate(15)" class="w-8 h-6 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 rounded"><i class="fas fa-redo text-[10px]"></i></button>
</div>
<button onclick="toggleFlip()" class="bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 w-8 h-8 rounded-lg flex items-center justify-center transition-all">
<i class="fas fa-arrows-alt-h text-[12px]"></i>
</button>
</div>
<div class="flex items-center gap-6 border-l border-white/10 pl-6">
<div class="flex flex-col w-28">
<div class="flex justify-between text-[9px] uppercase text-gray-500 font-bold mb-1">
<span>Size</span><span id="sizeVal">30px</span>
</div>
<input type="range" id="sizeSlider" min="1" max="300" value="30">
</div>
<div class="flex flex-col w-32">
<div class="flex justify-between text-[9px] uppercase text-gray-500 font-bold mb-1">
<span>Brush Opacity</span><span id="opacityVal">100%</span>
</div>
<div class="flex items-center gap-2">
<input type="range" id="opacitySlider" min="1" max="100" value="100" class="flex-1">
<button id="btn-pressure" onclick="togglePressure()" class="text-[10px] text-gray-500 hover:text-[#D38E3F] transition-colors" title="Toggle Pen Pressure Opacity">
<i class="fas fa-fingerprint"></i>
</button>
</div>
</div>
</div>
</div>
<div class="flex items-center gap-3">
<button id="themeToggle" onclick="toggleTheme()" class="p-2 text-gray-400 hover:text-[#D38E3F] transition-colors" title="Toggle Light/Dark Mode">
<i class="fas fa-moon"></i>
</button>
<input type="file" id="psdInput" class="hidden" accept=".psd" onchange="handlePsdImport(event)">
</div>
</header>
<div class="flex flex-1 overflow-hidden relative">
<aside class="w-16 ui-panel flex flex-col items-center py-6 gap-6 border-r z-40">
<button id="btn-brush" class="tool-btn active p-3 rounded-xl transition-all" onclick="setMode('brush')" title="Brush (B)">
<i class="fas fa-paint-brush"></i>
</button>
<div class="relative flex flex-col items-center">
    <button id="btn-bucket" class="tool-btn p-3 rounded-xl transition-all text-gray-500" 
        onpointerdown="startToolHold('bucket')" onpointerup="endToolHold('bucket')"
        onclick="setMode(lastBucketTool)" title="Paint Bucket / Gradient (G)">
        <i id="bucket-icon" class="fas fa-fill-drip"></i>
    </button>
    <!-- Hidden Switch Popup -->
    <div id="bucket-popup" class="tool-popup hidden">
        <button onclick="setMode('bucket')" class="p-2 hover:bg-[#D38E3F]/10 rounded text-gray-400 hover:text-[#D38E3F]"><i class="fas fa-fill-drip"></i></button>
        <button onclick="setMode('gradient')" class="p-2 hover:bg-[#D38E3F]/10 rounded text-gray-400 hover:text-[#D38E3F]"><i class="fas fa-stream"></i></button>
    </div>
</div>
<button id="btn-eraser" class="tool-btn p-3 rounded-xl transition-all text-gray-500" onclick="setMode('eraser')" title="Eraser (E)">
<i class="fas fa-eraser"></i>
</button>
<button id="btn-smudge" class="tool-btn p-3 rounded-xl transition-all text-gray-500" onclick="setMode('smudge')" title="Smudge (S)">
<i class="fas fa-wind"></i>
</button>
<div class="w-8 h-px bg-black/10 dark:bg-white/10"></div>
<button id="btn-tip-round" class="tool-btn active p-1.5 rounded-md text-[10px]" onclick="setBrushTip('round')">
<i class="fas fa-circle"></i>
</button>
<button id="btn-tip-flat" class="tool-btn p-1.5 rounded-md text-[10px] text-gray-500" onclick="setBrushTip('flat')">
<i class="fas fa-square"></i>
</button>
<button id="btn-brush-settings" class="tool-btn p-1.5 rounded-md text-[10px] text-gray-500" onclick="toggleBrushSettings()" title="Krita Brush Engine Settings">
<i class="fas fa-cog"></i>
</button>
<div class="w-8 h-px bg-black/10 dark:bg-white/10"></div>
<!-- Overlapping Primary/Secondary Colors -->
<div class="relative w-8 h-10">
    <div id="secondaryColorPreview" onclick="setActiveColorTarget('secondary')" class="absolute right-0 bottom-0 w-6 h-6 rounded-md border border-white/10 cursor-pointer shadow-lg z-10" style="background-color: #ffffff;" title="Secondary Color (Click to edit)"></div>
    <div id="activeColorPreview" onclick="setActiveColorTarget('primary')" class="absolute left-0 top-0 w-6 h-6 rounded-md border-2 border-white/20 shadow-xl z-20 color-preview-active" style="background-color: #D38E3F;" title="Primary Color (Click to edit)"></div>
</div>
</aside>
<main id="viewport" class="flex-1 relative canvas-container flex items-center justify-center overflow-auto">
<div id="canvasStack" style="width: 800px; height: 800px;">
<canvas id="displayCanvas"></canvas>
<canvas id="activeStrokeCanvas"></canvas>
</div>
<!-- Cursor Canvas moved to a HUD level inside the main viewport area -->
<canvas id="cursorCanvas"></canvas>

<!-- BRUSH SETTINGS PANEL -->
<div id="brushSettingsPanel" class="draggable-panel hidden left-20 top-20 w-72 ui-panel rounded-3xl p-5 shadow-2xl border">
<div class="panel-header flex justify-between items-center mb-4 text-[9px] font-bold uppercase text-[#D38E3F] tracking-wider">
<span>Brush Engine Settings</span>
<i class="fas fa-grip-lines"></i>
</div>
<div class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
<div>
<div class="flex justify-between text-[8px] uppercase font-bold text-gray-500"><span>Spacing</span><span id="bs-spacing-val">1%</span></div>
<input type="range" id="bs-spacing" min="1" max="100" value="1" class="hsb-track">
</div>
<div>
<div class="flex justify-between text-[8px] uppercase font-bold text-gray-500"><span>Hardness</span><span id="bs-hardness-val">100%</span></div>
<input type="range" id="bs-hardness" min="0" max="100" value="100" class="hsb-track">
</div>
<div>
<div class="flex justify-between text-[8px] uppercase font-bold text-gray-500"><span>Flow</span><span id="bs-flow-val">100%</span></div>
<input type="range" id="bs-flow" min="1" max="100" value="100" class="hsb-track">
</div>
<div>
<div class="flex justify-between text-[8px] uppercase font-bold text-gray-500"><span>Scatter</span><span id="bs-scatter-val">0%</span></div>
<input type="range" id="bs-scatter" min="0" max="200" value="0" class="hsb-track">
</div>
<div class="pt-2 border-t border-white/5">
<h4 class="text-[8px] uppercase font-black text-[#D38E3F] mb-3">Color Dynamics</h4>
<div class="space-y-3">
<div>
<div class="flex justify-between text-[8px] uppercase font-bold text-gray-500"><span>Hue Jitter</span><span id="bs-hueJitter-val">0%</span></div>
<input type="range" id="bs-hueJitter" min="0" max="100" value="0" class="hsb-track">
</div>
<div>
<div class="flex justify-between text-[8px] uppercase font-bold text-gray-500"><span>Sat Jitter</span><span id="bs-satJitter-val">0%</span></div>
<input type="range" id="bs-satJitter" min="0" max="100" value="0" class="hsb-track">
</div>
<div>
<div class="flex justify-between text-[8px] uppercase font-bold text-gray-500"><span>Value Jitter</span><span id="bs-briJitter-val">0%</span></div>
<input type="range" id="bs-briJitter" min="0" max="100" value="0" class="hsb-track">
</div>
<div class="flex items-center justify-between pt-1">
<span class="text-[8px] uppercase font-bold text-gray-500">Jitter Mode</span>
<select id="bs-jitterMode" class="w-24 text-[8px]">
<option value="tip">Per Tip</option>
<option value="stroke">Per Stroke</option>
</select>
</div>
</div>
</div>
</div>
<button onclick="toggleBrushSettings()" class="mt-6 w-full py-2 bg-[#D38E3F] text-white text-[9px] font-bold uppercase rounded-lg">Close</button>
</div>
<div id="colorPanel" class="draggable-panel left-8 bottom-8 w-64 ui-panel rounded-3xl p-5 shadow-2xl border">
<div class="panel-header flex justify-between items-center mb-3 text-[9px] font-bold uppercase text-gray-500 tracking-wider">
<span id="hexDisplay">#D38E3F</span>
<i class="fas fa-grip-lines"></i>
</div>
<div id="hsvBox" class="relative w-full aspect-square rounded-xl mb-4 cursor-crosshair overflow-hidden">
<div id="hsvPointer" class="absolute w-3 h-3 border-2 border-white rounded-full -translate-x-1/2 -translate-y-1/2 pointer-events-none shadow-md"></div>
</div>
<input type="range" id="hueBar" min="0" max="360" value="32" class="w-full mb-4">
<div class="space-y-2 mt-2">
<div class="flex flex-col">
<div class="flex justify-between text-[8px] uppercase font-bold text-gray-500"><span>Hue</span><span id="hLabel">32</span></div>
<input type="range" id="slider-h" min="0" max="360" value="32" class="hsb-track">
</div>
<div class="flex flex-col">
<div class="flex justify-between text-[8px] uppercase font-bold text-gray-500"><span>Saturation</span><span id="sLabel">70%</span></div>
<input type="range" id="slider-s" min="0" max="100" value="70" class="hsb-track">
</div>
<div class="flex flex-col">
<div class="flex justify-between text-[8px] uppercase font-bold text-gray-500"><span>Brightness</span><span id="vLabel">83%</span></div>
<input type="range" id="slider-v" min="0" max="100" value="83" class="hsb-track">
</div>
</div>
</div>
</main>
<aside class="w-80 ui-panel flex flex-col border-l z-40">
<div class="p-5 border-b">
<h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-4">Adjustments</h3>
<div class="grid grid-cols-2 gap-2">
<button onclick="applyAdjustment('hsb')" class="bg-black/5 dark:bg-white/5 p-3 rounded-xl border border-transparent hover:border-[#D38E3F] text-[9px] font-bold uppercase transition-all">Hue/Sat/Bri</button>
<button onclick="applyAdjustment('balance')" class="bg-black/5 dark:bg-white/5 p-3 rounded-xl border border-transparent hover:border-[#D38E3F] text-[9px] font-bold uppercase transition-all">Color Bal</button>
</div>
</div>
<div class="flex-1 flex flex-col min-h-0">
<div class="p-5 flex items-center justify-between">
<h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">Layers</h3>
<div class="flex gap-3 items-center">
<button onclick="addLayer()" class="text-gray-400 hover:text-[#D38E3F] transition-colors" title="New Layer (Ctrl+N)">
<i class="fas fa-plus-square"></i>
</button>
<button onclick="duplicateLayer()" class="text-gray-400 hover:text-[#D38E3F] transition-colors" title="Duplicate Layer (Ctrl+J)">
<i class="fas fa-copy"></i>
</button>
<button onclick="mergeDown()" class="text-gray-400 hover:text-[#D38E3F] transition-colors" title="Merge Down (Ctrl+E)">
<i class="fas fa-level-down-alt"></i>
</button>
<button onclick="triggerImageImport()" class="text-gray-400 hover:text-[#D38E3F] transition-colors" title="Import Image">
<i class="fas fa-file-import"></i>
</button>
<button id="btn-transform" onclick="toggleTransform()" class="text-gray-400 hover:text-[#D38E3F] transition-colors" title="Transform (Ctrl+T)">
<i class="fas fa-expand"></i>
</button>
<input type="file" id="imageInput" class="hidden" accept="image/*" onchange="handleImageImport(event)">
</div>
</div>
<div id="layerList" class="px-3 space-y-1 overflow-y-auto flex-1 pb-4"></div>
</div>
</aside>
<div id="adjPanel" class="draggable-panel hidden top-20 right-80 w-72 ui-panel rounded-3xl p-6 shadow-2xl border">
<div class="panel-header flex justify-between items-center mb-6 text-[10px] font-black text-[#D38E3F] uppercase tracking-widest">
<span id="adjTitle">Adjust</span>
<i class="fas fa-grip-lines"></i>
</div>
<div id="adjControls" class="space-y-6"></div>
<div class="flex gap-4 mt-8">
<button onclick="cancelAdj()" class="flex-1 py-3 text-[9px] font-bold uppercase text-gray-500 hover:text-[#D38E3F] transition-colors">Cancel</button>
<button onclick="confirmAdj()" class="flex-1 py-3 bg-[#D38E3F] rounded-xl text-[9px] font-bold uppercase text-white">Apply</button>
</div>
</div>
</div>
<script>
const viewport = document.getElementById('viewport');
const stack = document.getElementById('canvasStack');
const list = document.getElementById('layerList');
const colorPreview = document.getElementById('activeColorPreview');
const secondaryColorPreview = document.getElementById('secondaryColorPreview');
const hexDisplay = document.getElementById('hexDisplay');
const displayCanvas = document.getElementById('displayCanvas');
const displayCtx = displayCanvas.getContext('2d');
const activeStrokeCanvas = document.getElementById('activeStrokeCanvas');
const activeStrokeCtx = activeStrokeCanvas.getContext('2d');
const cursorCanvas = document.getElementById('cursorCanvas');
const curCtx = cursorCanvas.getContext('2d');
const BLEND_MODES = [
{ label: 'Normal', value: 'source-over' },
{ label: 'Multiply', value: 'multiply' },
{ label: 'Screen', value: 'screen' },
{ label: 'Overlay', value: 'overlay' },
{ label: 'Darken', value: 'darken' },
{ label: 'Lighten', value: 'lighten' },
{ label: 'Color Dodge', value: 'color-dodge' },
{ label: 'Color Burn', value: 'color-burn' },
{ label: 'Hard Light', value: 'hard-light' },
{ label: 'Soft Light', value: 'soft-light' },
{ label: 'Difference', value: 'difference' },
{ label: 'Exclusion', value: 'exclusion' },
{ label: 'Hue', value: 'hue' },
{ label: 'Saturation', value: 'saturation' },
{ label: 'Color', value: 'color' },
{ label: 'Luminosity', value: 'luminosity' }
];
let layers = [];
let activeIdx = 0;
let isPainting = false;
let brushSize = 30;
let opacity = 1.0;
let color = 'rgb(211, 142, 63)';
let secondaryColor = 'rgb(255, 255, 255)';
let activeColorTarget = 'primary'; // Track which color slot we are currently editing
let mode = 'brush';
let lastBucketTool = 'bucket';
let gradientType = 'fg-bg';
let brushTip = 'round';
let lastX = 0, lastY = 0;
let isAltDown = false;
let isSpaceDown = false;
let isPanning = false;
let panMouseX = 0, panMouseY = 0;
let usePressure = false;
let isTransforming = false;
let hoveredHandle = null;
let transformState = { x: 0, y: 0, width: 0, height: 0, scale: 1, rotation: 0, originalCanvas: null, activeHandle: null, startMouse: null, initialState: null };
let zoom = 1.0;
let rotation = 0;
let flipH = false;
let curH = 32, curS = 70, curV = 83;
let smudgeBuffer = null;
let gradStart = null;
let toolHoldTimer = null;
const undoStack = [];
const redoStack = [];
const INTERNAL_RES = 1600;
let draggedIdx = null;
// Krita-inspired Brush Settings - UPDATED DEFAULTS
const brushSettings = {
spacing: 0.01, // 1%
hardness: 1.0, // 100%
flow: 1.0,
scatter: 0.0,
hueJitter: 0.0,

function triggerPsdImport() {

async function handlePsdImport(e) {
const file = e.target.files[0];
if (!file) return;

try {
const arrayBuffer = await file.arrayBuffer();
const psd = agPsd.readPsd(arrayBuffer);
if (!psd || !psd.children) throw new Error("Invalid PSD file");
saveUndo();
layers = [];
psd.children.reverse().forEach(psdLayer => {
const canvas = document.createElement('canvas');
canvas.width = canvas.height = INTERNAL_RES;
const ctx = canvas.getContext('2d');
if (psdLayer.canvas) {
ctx.drawImage(psdLayer.canvas, 0, 0, psdLayer.canvas.width, psdLayer.canvas.height, 0, 0, INTERNAL_RES, INTERNAL_RES);
}
const blendModeMap = {
'norm': 'source-over', 'mul ': 'multiply', 'scrn': 'screen', 'over': 'overlay',
'dark': 'darken', 'lite': 'lighten', 'lddg': 'color-dodge', 'idiv': 'color-burn',
'hLit': 'hard-light', 'sLit': 'soft-light', 'diff': 'difference', 'smud': 'exclusion',
'hue ': 'hue', 'sat ': 'saturation', 'colr': 'color', 'lum ': 'luminosity'
};
layers.push({
id: Date.now() + Math.random(),
name: psdLayer.name || "Layer",

visible: psdLayer.visible !== false,
alphaLocked: !!psdLayer.transparencyProtected,
clippingMask: !!psdLayer.clipping,

});

refreshUI();
renderStack();
e.target.value = '';
} catch (err) {
console.error("PSD Load Error:", err);
alert("Could not load PSD file.");
}
}

async function savePsd() {
const psd = { width: INTERNAL_RES, height: INTERNAL_RES, children: [] };
const blendModeToPsd = {
'source-over': 'norm', 'multiply': 'mul ', 'screen': 'scrn', 'overlay': 'over',
'darken': 'dark', 'lighten': 'lite', 'color-dodge': 'lddg', 'color-burn': 'idiv',
'hard-light': 'hLit', 'soft-light': 'sLit', 'difference': 'diff', 'exclusion': 'smud',
'hue': 'hue ', 'saturation': 'sat ', 'color': 'colr', 'luminosity': 'lum '
};
const layersToExport = [...layers].reverse();
psd.children = layersToExport.map(l => ({
name: l.name, canvas: l.canvas, visible: l.visible, opacity: Math.round(l.opacity * 255),
blendMode: blendModeToPsd[l.blendMode] || 'norm', clipping: l.clippingMask, transparencyProtected: l.alphaLocked

try {
const buffer = agPsd.writePsd(psd);
const blob = new Blob([buffer], { type: 'application/octet-stream' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url; a.download = 'chroma_artwork.psd'; a.click();

} catch (err) {

}
}

function setActiveColorTarget(target) {
    activeColorTarget = target;
    // Update UI highlights
    colorPreview.classList.toggle('color-preview-active', target === 'primary');
    secondaryColorPreview.classList.toggle('color-preview-active', target === 'secondary');
    
    // Convert RGB back to HSV to sync sliders
    const rgbStr = target === 'primary' ? color : secondaryColor;
    const [h, s, v] = rgbToHsvRaw(...rgbStr.match(/\d+/g).map(Number));
    curH = h; curS = s; curV = v;

function swapColors() {
    const temp = color;
    color = secondaryColor;
    secondaryColor = temp;
    // Update HSV to match whichever one is active
    const rgbStr = activeColorTarget === 'primary' ? color : secondaryColor;
    const [h, s, v] = rgbToHsvRaw(...rgbStr.match(/\d+/g).map(Number));
    curH = h; curS = s; curV = v;
    finalizeColor();
}

function rgbToHsvRaw(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, v = max;
    const d = max - min;
    s = max === 0 ? 0 : d / max;
    if (max === min) h = 0;
    else {
        switch (max) {
            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
            case g: h = (b - r) / d + 2; break;
            case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
    }
    return [h * 360, s * 100, v * 100];
}

function sampleColorAt(pos) {
const data = displayCtx.getImageData(pos.x, pos.y, 1, 1).data;
if (data[3] === 0) return;
const [h, s, v] = rgbToHsvRaw(data[0], data[1], data[2]);
curH = h; curS = s; curV = v;
finalizeColor();

function handleKeys(e) {
if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

curCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);

e.preventDefault();

const keyLow = e.key.toLowerCase();
if (e.ctrlKey && e.shiftKey && keyLow === 'z') { e.preventDefault(); redo(); return; }
if (e.ctrlKey && keyLow === 'z') { e.preventDefault(); undo(); return; }
if (e.ctrlKey && keyLow === 'n') { e.preventDefault(); addLayer(); }
if (e.ctrlKey && keyLow === 'j') { e.preventDefault(); duplicateLayer(); }
if (e.ctrlKey && keyLow === 'e') { e.preventDefault(); mergeDown(); }
if (e.ctrlKey && keyLow === 't') { e.preventDefault(); toggleTransform(); }
if (e.key === 'Enter' && isTransforming) { e.preventDefault(); toggleTransform(); }
if (e.key === 'Escape' && isTransforming) { e.preventDefault(); cancelTransform(); }
if (e.ctrlKey && e.key === '+') { e.preventDefault(); changeZoom(0.1); }
if (e.ctrlKey && e.key === '-') { e.preventDefault(); changeZoom(-0.1); }
if (e.ctrlKey && e.key === '0') { e.preventDefault(); zoom = 1.0; rotation = 0; flipH = false; updateViewport(); }
if (keyLow === 'b') setMode('brush');
if (keyLow === 'e') setMode('eraser');
if (keyLow === 's') setMode('smudge');
if (keyLow === 'g') {

    else if (mode === 'gradient') setMode('bucket');

function setupDraggable(el) {

function toggleTransform() {

function addLayer(name, isWhite = false) {

function duplicateLayer() {

const canvas = document.createElement('canvas'); canvas.width = canvas.height = INTERNAL_RES;
const ctx = canvas.getContext('2d'); ctx.drawImage(source.canvas, 0, 0);

function mergeDown() {

saveUndo();
const top = layers[activeIdx]; const bottom = layers[activeIdx + 1];
const temp = document.createElement('canvas'); temp.width = temp.height = INTERNAL_RES;
const tctx = temp.getContext('2d');
if (top.clippingMask) {

if (baseLayer) {
tctx.drawImage(top.canvas, 0, 0); tctx.globalCompositeOperation = 'destination-in'; tctx.drawImage(baseLayer.canvas, 0, 0);
} else { tctx.drawImage(top.canvas, 0, 0); }
} else { tctx.drawImage(top.canvas, 0, 0); }

function deleteLayer(i, e) {

if (activeIdx > i) activeIdx--;
activeIdx = Math.max(0, Math.min(activeIdx, layers.length - 1)); refreshUI(); renderStack();

function triggerImageImport() { document.getElementById('imageInput').click(); }

function handleImageImport(e) {

function startRename(i, e) {

function refreshUI() {

function findClippingBase(i) {
for (let j = i + 1; j < layers.length; j++) { if (!layers[j].clippingMask) return layers[j]; }
return null;
}

function renderStack() {
displayCtx.clearRect(0, 0, INTERNAL_RES, INTERNAL_RES);
for (let i = layers.length - 1; i >= 0; i--) {
const layer = layers[i]; if (!layer.visible) continue;
displayCtx.save(); displayCtx.globalAlpha = layer.opacity;
const isDrawingCurrent = isPainting && i === activeIdx;
if (isTransforming && i === activeIdx) {
displayCtx.globalAlpha *= 0.5;
displayCtx.translate(transformState.x, transformState.y); displayCtx.rotate(transformState.rotation); displayCtx.scale(transformState.scale, transformState.scale);
displayCtx.drawImage(transformState.originalCanvas, -INTERNAL_RES/2, -INTERNAL_RES/2);
} else if (layer.clippingMask) {
const baseLayer = findClippingBase(i);
if (baseLayer) {
const tempCanvas = document.createElement('canvas'); tempCanvas.width = tempCanvas.height = INTERNAL_RES;
const tctx = tempCanvas.getContext('2d'); tctx.drawImage(layer.canvas, 0, 0);
if (isDrawingCurrent) {
if (mode === 'eraser') tctx.globalCompositeOperation = 'destination-out';
else if (layer.alphaLocked) tctx.globalCompositeOperation = 'source-atop';
else tctx.globalCompositeOperation = 'source-over';
tctx.drawImage(activeStrokeCanvas, 0, 0);
}
tctx.globalCompositeOperation = 'destination-in'; tctx.drawImage(baseLayer.canvas, 0, 0);
displayCtx.globalCompositeOperation = layer.blendMode; displayCtx.drawImage(tempCanvas, 0, 0);
} else { displayCtx.globalCompositeOperation = layer.blendMode; displayCtx.drawImage(layer.canvas, 0, 0); }
} else {
if (isDrawingCurrent) {
const buffer = document.createElement('canvas'); buffer.width = buffer.height = INTERNAL_RES;
const bctx = buffer.getContext('2d'); bctx.drawImage(layer.canvas, 0, 0);
if (mode === 'eraser') bctx.globalCompositeOperation = 'destination-out';
else if (layer.alphaLocked) bctx.globalCompositeOperation = 'source-atop';
else bctx.globalCompositeOperation = 'source-over';
bctx.drawImage(activeStrokeCanvas, 0, 0);
displayCtx.globalCompositeOperation = layer.blendMode; displayCtx.drawImage(buffer, 0, 0);
} else { displayCtx.globalCompositeOperation = layer.blendMode; displayCtx.drawImage(layer.canvas, 0, 0); }
}
displayCtx.restore();
}
}

function start(e) {
if (e.pointerType === 'pen' || e.pointerType === 'mouse') { stack.setPointerCapture(e.pointerId); }
if (isSpaceDown) { isPanning = true; panMouseX = e.clientX; panMouseY = e.clientY; stack.style.cursor = 'grabbing'; return; }
const pos = getPos(e); lastX = pos.x; lastY = pos.y;
brushSettings.lastDabX = pos.x; brushSettings.lastDabY = pos.y; brushSettings.distSinceLastDab = 0;
if (brushSettings.jitterMode === 'stroke') {
brushSettings.strokeHueOffset = (Math.random() - 0.5) * brushSettings.hueJitter * 360;
brushSettings.strokeSatOffset = (Math.random() - 0.5) * brushSettings.satJitter * 100;
brushSettings.strokeBriOffset = (Math.random() - 0.5) * brushSettings.briJitter * 100;
} else { brushSettings.strokeHueOffset = brushSettings.strokeSatOffset = brushSettings.strokeBriOffset = 0; }
if (isAltDown && (mode === 'brush' || mode === 'bucket' || mode === 'gradient')) { sampleColorAt(pos); return; }
if (isTransforming) {
const handle = getTransformHandle(pos.x, pos.y);
transformState.activeHandle = handle; transformState.startMouse = { x: pos.x, y: pos.y }; transformState.initialState = { ...transformState };
return;
}
if (mode === 'bucket') { saveUndo(); floodFill(pos.x, pos.y); }
else if (mode === 'gradient') { 
    isPainting = true;
    gradStart = pos; 
}
else {
isPainting = true; saveUndo(); activeStrokeCtx.clearRect(0,0,INTERNAL_RES, INTERNAL_RES);
if (mode === 'smudge') {
smudgeBuffer = document.createElement('canvas'); smudgeBuffer.width = smudgeBuffer.height = brushSize;
const sctx = smudgeBuffer.getContext('2d');
sctx.save();
sctx.beginPath();
sctx.arc(brushSize/2, brushSize/2, brushSize/2, 0, Math.PI*2);
sctx.clip();
sctx.drawImage(layers[activeIdx].canvas, pos.x - brushSize/2, pos.y - brushSize/2, brushSize, brushSize, 0, 0, brushSize, brushSize);
sctx.restore();
}
draw(e); renderStack();
}
}

function move(e) {
if (isPanning) {
viewport.scrollLeft -= (e.clientX - panMouseX); viewport.scrollTop -= (e.clientY - panMouseY);
panMouseX = e.clientX; panMouseY = e.clientY; return;
}
const pos = getPos(e);
if (isAltDown && isPainting) sampleColorAt(pos);
if (isTransforming) {
if (transformState.activeHandle) { updateTransform(pos); renderStack(); } else hoveredHandle = getTransformHandle(pos.x, pos.y);
} else if (isPainting) { 
    if (mode === 'gradient') {
        updateCursor(pos); 
    } else {
        draw(e); renderStack(); 
    }
}
updateCursor(pos); lastX = pos.x; lastY = pos.y;
}

function stop(e) {
if (isPanning) { isPanning = false; stack.style.cursor = isSpaceDown ? 'grab' : (isTransforming ? 'crosshair' : 'none'); return; }
if (isTransforming) transformState.activeHandle = null;
if (isPainting) { 
    if (mode === 'gradient') {
        const pos = getPos(e);
        applyGradient(gradStart, pos);
        gradStart = null;
    } else {
        commitActiveStroke(); 
    }
    isPainting = false; smudgeBuffer = null; renderStack(); 
}
}

function applyGradient(start, end) {
    saveUndo();
    const l = layers[activeIdx];
    const grad = l.ctx.createLinearGradient(start.x, start.y, end.x, end.y);
    
    let c1, c2;
    switch(gradientType) {
        case 'fg-bg': c1 = color; c2 = secondaryColor; break;
        case 'bg-fg': c1 = secondaryColor; c2 = color; break;
        case 'fg-trans': c1 = color; c2 = color.replace('rgb', 'rgba').replace(')', ', 0)'); break;
        case 'bg-trans': c1 = secondaryColor; c2 = secondaryColor.replace('rgb', 'rgba').replace(')', ', 0)'); break;
    }

    grad.addColorStop(0, c1);
    grad.addColorStop(1, c2);
    l.ctx.save();
    l.ctx.globalAlpha = opacity;
    if (l.alphaLocked) l.ctx.globalCompositeOperation = 'source-atop';
    l.ctx.fillStyle = grad;
    l.ctx.fillRect(0, 0, INTERNAL_RES, INTERNAL_RES);
    l.ctx.restore();
}

function commitActiveStroke() {
const layer = layers[activeIdx]; if (!layer) return;
layer.ctx.save();
if (mode === 'eraser') layer.ctx.globalCompositeOperation = 'destination-out';
else if (layer.alphaLocked) layer.ctx.globalCompositeOperation = 'source-atop';
else layer.ctx.globalCompositeOperation = 'source-over';
layer.ctx.drawImage(activeStrokeCanvas, 0, 0); layer.ctx.restore();
activeStrokeCtx.clearRect(0,0,INTERNAL_RES, INTERNAL_RES);
}

function getTransformHandle(x, y) {
const s = transformState; const vs = INTERNAL_RES / stack.getBoundingClientRect().width; const threshold = 25 * vs;
const hw = (s.width / 2) * s.scale; const hh = (s.height / 2) * s.scale;
const rot = { x: s.x + 0 * Math.cos(s.rotation) - (-hh - 50 * vs) * Math.sin(s.rotation), y: s.y + 0 * Math.sin(s.rotation) + (-hh - 50 * vs) * Math.cos(s.rotation) };
if (Math.hypot(x - rot.x, y - rot.y) < threshold) return 'rotate';
const corners = [ { id: 'tl', x: s.x - hw, y: s.y - hh }, { id: 'tr', x: s.x + hw, y: s.y - hh }, { id: 'bl', x: s.x - hw, y: s.y + hh }, { id: 'br', x: s.x + hw, y: s.y + hh } ];
for (const c of corners) {
const rad = s.rotation; const dx = c.x - s.x; const dy = c.y - s.y;
const px = s.x + dx * Math.cos(rad) - dy * Math.sin(rad); const py = s.y + dx * Math.sin(rad) + dy * Math.cos(rad);
if (Math.hypot(x - px, y - py) < threshold) return c.id;
}
const rad = -s.rotation; const dx = (x - s.x) * Math.cos(rad) - (y - s.y) * Math.sin(rad); const dy = (x - s.x) * Math.sin(rad) + (y - s.y) * Math.cos(rad);
if (Math.abs(dx) < hw && Math.abs(dy) < hh) return 'move';
return null;
}

function updateTransform(pos) {
const s = transformState; const init = s.initialState; const dx = pos.x - s.startMouse.x; const dy = pos.y - s.startMouse.y;
if (s.activeHandle === 'move') { s.x = init.x + dx; s.y = init.y + dy; }
else if (s.activeHandle === 'rotate') { s.rotation = init.rotation + (Math.atan2(pos.y - s.y, pos.x - s.x) - Math.atan2(s.startMouse.y - s.y, s.startMouse.x - s.x)); }
else if (['tl', 'tr', 'bl', 'br'].includes(s.activeHandle)) { s.scale = Math.max(0.01, init.scale * (Math.hypot(pos.x - s.x, pos.y - s.y) / Math.hypot(s.startMouse.x - s.x, s.startMouse.y - s.y))); }
}

function updateCursor(pos) {
curCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
const vRect = viewport.getBoundingClientRect();
const sRect = stack.getBoundingClientRect();

// Helper to project Internal Coords (1600x1600) to Screen space on the overlay canvas
function project(ix, iy) {
    const centerX = sRect.left + sRect.width / 2 - vRect.left;
    const centerY = sRect.top + sRect.height / 2 - vRect.top;
    let dx = ix - INTERNAL_RES / 2;
    let dy = iy - INTERNAL_RES / 2;
    if (flipH) dx = -dx;
    const sFactor = (sRect.width / INTERNAL_RES);
    const rad = (rotation * Math.PI) / 180;
    const rx = (dx * Math.cos(rad) - dy * Math.sin(rad)) * sFactor;
    const ry = (dx * Math.sin(rad) + dy * Math.cos(rad)) * sFactor;
    return { x: centerX + rx, y: centerY + ry };
}

const mx = pos.rawX - vRect.left;
const my = pos.rawY - vRect.top;

if (pos.rawX < vRect.left || pos.rawX > vRect.right || pos.rawY < vRect.top || pos.rawY > vRect.bottom) return;

curCtx.save();

let outlineColor = 'white';
try {
    const px = Math.floor(pos.x);
    const py = Math.floor(pos.y);
    if (px >= 0 && px < INTERNAL_RES && py >= 0 && py < INTERNAL_RES) {
        const pixel = displayCtx.getImageData(px, py, 1, 1).data;
        const v = pixel[3] === 0 ? 100 : (Math.max(pixel[0], pixel[1], pixel[2]) / 255 * 100);
        outlineColor = v > 50 ? 'black' : 'white';
    }
} catch(e) { outlineColor = 'white'; }

if (mode === 'bucket' || mode === 'gradient') {
    curCtx.strokeStyle = outlineColor;
    curCtx.lineWidth = 2;
    const s = 10;
    curCtx.beginPath();
    curCtx.moveTo(mx - s, my - s); curCtx.lineTo(mx + s, my + s);
    curCtx.moveTo(mx + s, my - s); curCtx.lineTo(mx - s, my + s);
    curCtx.stroke();
    
    if (mode === 'gradient' && gradStart) {
        const start = project(gradStart.x, gradStart.y);
        curCtx.setLineDash([5, 5]);
        curCtx.beginPath();
        curCtx.moveTo(start.x, start.y);
        curCtx.lineTo(mx, my);
        curCtx.stroke();
    }
} else if (isTransforming) {
    const s = transformState;
    const hw = s.width / 2 * s.scale;
    const hh = s.height / 2 * s.scale;
    
    // Project corners to viewport space so they are visible even if off-canvas
    const corners = [
        project(s.x - s.width/2 * s.scale, s.y - s.height/2 * s.scale),
        project(s.x + s.width/2 * s.scale, s.y - s.height/2 * s.scale),
        project(s.x + s.width/2 * s.scale, s.y + s.height/2 * s.scale),
        project(s.x - s.width/2 * s.scale, s.y + s.height/2 * s.scale)
    ];
    
    curCtx.strokeStyle = '#D38E3F';
    curCtx.lineWidth = 2;
    curCtx.beginPath();
    curCtx.moveTo(corners[0].x, corners[0].y);
    corners.forEach(c => curCtx.lineTo(c.x, c.y));
    curCtx.closePath();
    curCtx.stroke();
    
    // Draw grab handles
    corners.forEach(c => {
        curCtx.fillStyle = '#D38E3F';
        curCtx.fillRect(c.x - 6, c.y - 6, 12, 12);
    });
    
    // Rotation handle
    const rotBase = project(s.x, s.y - s.height/2 * s.scale);
    const rotTip = project(s.x, s.y - (s.height/2 * s.scale + 40));
    curCtx.beginPath();
    curCtx.moveTo(rotBase.x, rotBase.y);
    curCtx.lineTo(rotTip.x, rotTip.y);
    curCtx.stroke();
    curCtx.beginPath();
    curCtx.arc(rotTip.x, rotTip.y, 8, 0, Math.PI*2);
    curCtx.fill();

} else if (!isSpaceDown) {
    curCtx.strokeStyle = outlineColor;
    curCtx.lineWidth = 1;
    const screenRadius = (brushSize / 2) * (sRect.width / INTERNAL_RES);
    if (brushTip === 'round') {
        curCtx.beginPath();
        curCtx.arc(mx, my, screenRadius, 0, Math.PI * 2);
        curCtx.stroke();
    } else {
        curCtx.strokeRect(mx - screenRadius, my - screenRadius/3, screenRadius*2, screenRadius*2/3);
    }
}
curCtx.restore();
}

function renderDab(ctx, x, y, size, colorString, hardness, currentFlow) {
ctx.save(); ctx.translate(x, y); ctx.globalAlpha = currentFlow;
if (brushTip === 'round') {
const rad = size / 2; const innerRad = rad * Math.min(hardness, 0.999);
const grad = ctx.createRadialGradient(0, 0, innerRad, 0, 0, rad);
grad.addColorStop(0, colorString); grad.addColorStop(1, colorString.replace('rgb', 'rgba').replace(')', ', 0)'));
ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, rad, 0, Math.PI * 2); ctx.fill();
} else { ctx.fillStyle = colorString; ctx.fillRect(-size/2, -size/6, size, size/3); }
ctx.restore();
}

function getEngineColor(h, s, v) {
h = (h + 360) % 360; s = Math.max(0, Math.min(100, s)) / 100; v = Math.max(0, Math.min(100, v)) / 100;
const f = n => v * (1 - s * Math.max(0, Math.min((n + h / 60) % 6, 4 - (n + h / 60) % 6, 1)));
return `rgb(${Math.round(f(5) * 255)},${Math.round(f(3) * 255)},${Math.round(f(1) * 255)})`;
}

function draw(e) {
const pos = getPos(e);
const layer = layers[activeIdx]; if (!layer || !layer.visible) return;
let finalOpacity = opacity; if (usePressure && e.pressure !== undefined && e.pressure > 0) finalOpacity *= e.pressure;
const spacingPx = Math.max(1, brushSize * brushSettings.spacing);
const dist = Math.hypot(pos.x - lastX, pos.y - lastY);
brushSettings.distSinceLastDab += dist;
while (brushSettings.distSinceLastDab >= spacingPx) {
const ratio = (spacingPx - (brushSettings.distSinceLastDab - dist)) / dist;
const dabX = lastX + (pos.x - lastX) * (isNaN(ratio) ? 1 : ratio);
const dabY = lastY + (pos.y - lastY) * (isNaN(ratio) ? 1 : ratio);
let renderX = dabX, renderY = dabY;
if (brushSettings.scatter > 0) { renderX += (Math.random() - 0.5) * brushSettings.scatter * brushSize; renderY += (Math.random() - 0.5) * brushSettings.scatter * brushSize; }
let dH = brushSettings.strokeHueOffset, dS = brushSettings.strokeSatOffset, dV = brushSettings.strokeBriOffset;
if (brushSettings.jitterMode === 'tip') { dH = (Math.random() - 0.5) * brushSettings.hueJitter * 360; dS = (Math.random() - 0.5) * brushSettings.satJitter * 100; dV = (Math.random() - 0.5) * brushSettings.briJitter * 100; }
if (mode === 'smudge' && smudgeBuffer) {
activeStrokeCtx.save();
activeStrokeCtx.globalAlpha = finalOpacity * brushSettings.flow;
activeStrokeCtx.drawImage(smudgeBuffer, renderX - brushSize/2, renderY - brushSize/2, brushSize, brushSize);
activeStrokeCtx.restore();
} else {
const dabColor = (mode === 'eraser') ? 'rgb(255,255,255)' : getEngineColor(curH + dH, curS + dS, curV + dV);
renderDab(activeStrokeCtx, renderX, renderY, brushSize, dabColor, brushSettings.hardness, finalOpacity * brushSettings.flow);
}
brushSettings.distSinceLastDab -= spacingPx; brushSettings.lastDabX = dabX; brushSettings.lastDabY = dabY;
}
}

function floodFill(x,y) { const l = layers[activeIdx]; l.ctx.save(); l.ctx.fillStyle = color; l.ctx.globalAlpha = opacity; if (l.alphaLocked) l.ctx.globalCompositeOperation = 'source-atop'; l.ctx.fillRect(0,0,INTERNAL_RES,INTERNAL_RES); l.ctx.restore(); renderStack(); }

function captureState() {
return {
activeIdx: activeIdx,
layers: layers.map(l => {
const canvasCopy = document.createElement('canvas'); canvasCopy.width = canvasCopy.height = INTERNAL_RES;
canvasCopy.getContext('2d').drawImage(l.canvas, 0, 0);
return { ...l, canvas: canvasCopy, ctx: canvasCopy.getContext('2d') };
})
};
}

function saveUndo() { redoStack.length = 0; undoStack.push(captureState()); if (undoStack.length > 20) undoStack.shift(); }
function undo() { if (!undoStack.length) return; redoStack.push(captureState()); const snapshot = undoStack.pop(); layers = snapshot.layers; activeIdx = snapshot.activeIdx; refreshUI(); renderStack(); }
function redo() { if (!redoStack.length) return; undoStack.push(captureState()); const snapshot = redoStack.pop(); layers = snapshot.layers; activeIdx = snapshot.activeIdx; refreshUI(); renderStack(); }
function exportCanvas() { const a = document.createElement('a'); a.download = 'chroma.png'; a.href = displayCanvas.toDataURL(); a.click(); }

function setMode(m) { 
    mode = m; 
    if (m === 'bucket' || m === 'gradient') {
        lastBucketTool = m;
        document.getElementById('bucket-icon').className = (m === 'bucket') ? 'fas fa-fill-drip' : 'fas fa-stream';
    }
    
    // Toggle visibility of gradient specific UI
    document.getElementById('gradientOptions').classList.toggle('hidden', m !== 'gradient');
    document.getElementById('gradientOptions').classList.toggle('flex', m === 'gradient');

    document.querySelectorAll('.tool-btn').forEach(b => {
        b.classList.toggle('active', b.id === `btn-${m}` || (b.id === 'btn-bucket' && (m === 'bucket' || m === 'gradient')));
    }); 
}

function setBrushTip(t) { brushTip = t; document.querySelectorAll('[id^=btn-tip]').forEach(b => b.classList.toggle('active', b.id === `btn-tip-${t}`)); }

function getPos(e) {
const rect = stack.getBoundingClientRect();
let x = e.clientX - (rect.left + rect.width / 2), y = e.clientY - (rect.top + rect.height / 2);
const rad = -(rotation * Math.PI) / 180;
let rotX = x * Math.cos(rad) - y * Math.sin(rad), rotY = x * Math.sin(rad) + y * Math.cos(rad);
if (flipH) rotX = -rotX;
const factor = INTERNAL_RES / (rect.width);
return { x: rotX * factor + INTERNAL_RES/2, y: rotY * factor + INTERNAL_RES/2, rawX: e.clientX, rawY: e.clientY };
}

function setupHSVSystem() {
const box = document.getElementById('hsvBox');
const upd = (e) => {
const r = box.getBoundingClientRect(); curS = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * 100; curV = (1 - Math.max(0, Math.min(1, (e.clientY - r.top) / r.height))) * 100;
finalizeColor();
};
box.addEventListener('pointerdown', (e) => {
box.setPointerCapture(e.pointerId); upd(e);
const mv = (pe) => upd(pe); box.addEventListener('pointermove', mv);
box.addEventListener('pointerup', () => box.removeEventListener('pointermove', mv), { once: true });
});
document.getElementById('hueBar').oninput = (e) => { curH = e.target.value; finalizeColor(); };
document.getElementById('slider-h').oninput = (e) => { curH = e.target.value; finalizeColor(); };
document.getElementById('slider-s').oninput = (e) => { curS = e.target.value; finalizeColor(); };
document.getElementById('slider-v').oninput = (e) => { curV = e.target.value; finalizeColor(); };
}

function finalizeColor() {
const h = curH, s = curS/100, v = curV/100;
const f = n => v * (1 - s * Math.max(0, Math.min((n + h / 60) % 6, 4 - (n + h / 60) % 6, 1)));
const r = Math.round(f(5) * 255), g = Math.round(f(3) * 255), b = Math.round(f(1) * 255);
const newRgb = `rgb(${r},${g},${b})`;

if (activeColorTarget === 'primary') {
    color = newRgb;
    colorPreview.style.backgroundColor = color;
} else {
    secondaryColor = newRgb;
    secondaryColorPreview.style.backgroundColor = secondaryColor;
}

hexDisplay.innerText = ("#" + [r,g,b].map(x => x.toString(16).padStart(2, '0')).join('')).toUpperCase();
document.getElementById('hsvBox').style.backgroundColor = `hsl(${curH}, 100%, 50%)`;
document.getElementById('hsvPointer').style.left = curS + '%'; document.getElementById('hsvPointer').style.top = (100 - curV) + '%';
document.getElementById('hueBar').value = curH; document.getElementById('slider-h').value = curH; document.getElementById('slider-s').value = curS; document.getElementById('slider-v').value = curV;
document.getElementById('hLabel').innerText = Math.round(curH); document.getElementById('sLabel').innerText = Math.round(curS) + '%'; document.getElementById('vLabel').innerText = Math.round(curV) + '%';
}

function applyAdjustment(type) {
saveUndo(); const l = layers[activeIdx]; origData = l.ctx.getImageData(0,0,INTERNAL_RES, INTERNAL_RES);
document.getElementById('adjPanel').classList.remove('hidden'); const ctrl = document.getElementById('adjControls'); ctrl.innerHTML = '';
if(type === 'hsb') [['Hue',-180,180,0,'h'],['Saturation',-100,100,0,'s'],['Brightness',-100,100,0,'v']].forEach(s => createSlider(...s));
else [['Red',-100,100,0,'r'],['Green',-100,100,0,'g'],['Blue',-100,100,0,'bl']].forEach(s => createSlider(...s));
}

function createSlider(l, min, max, v, id) {
const d = document.createElement('div'); d.innerHTML = `<div class="flex justify-between mb-2 text-[9px] uppercase text-gray-500 font-bold"><span>${l}</span><span id="val-${id}">0</span></div><input type="range" id="adj-${id}" min="${min}" max="${max}" value="${v}" class="w-full">`;
document.getElementById('adjControls').appendChild(d); d.querySelector('input').oninput = (e) => { document.getElementById(`val-${id}`).innerText = e.target.value; runAdj(); };
}

function runAdj() {
const data = new ImageData(new Uint8ClampedArray(origData.data), INTERNAL_RES, INTERNAL_RES);
const p = data.data, isHSL = !!document.getElementById('adj-h');
const hS = parseInt(document.getElementById('adj-h')?.value || 0), sS = parseInt(document.getElementById('adj-s')?.value || 0), vS = parseInt(document.getElementById('adj-v')?.value || 0);
const rS = parseInt(document.getElementById('adj-r')?.value || 0), gS = parseInt(document.getElementById('adj-g')?.value || 0), blS = parseInt(document.getElementById('adj-bl')?.value || 0);
for(let i=0; i<p.length; i+=4) {
if (p[i+3] === 0) continue;
if (isHSL) { let [h, s, v] = rgbToHsvRaw(p[i], p[i+1], p[i+2]); h = (h + hS + 360) % 360; s = Math.max(0, Math.min(100, s + sS)); v = Math.max(0, Math.min(100, v + vS)); const [nr, ng, nb] = hsvToRgb(h, s, v); p[i] = nr; p[i+1] = ng; p[i+2] = nb; }
else { p[i] = Math.max(0, Math.min(255, p[i] + rS)); p[i+1] = Math.max(0, Math.min(255, p[i+1] + gS)); p[i+2] = Math.max(0, Math.min(255, p[i+2] + blS)); }
}
layers[activeIdx].ctx.putImageData(data, 0, 0); renderStack();
}

function hsvToRgb(h, s, v) {
h /= 360; s /= 100; v /= 100; const f = n => v * (1 - s * Math.max(0, Math.min((n + h * 6) % 6, 4 - (n + h * 6) % 6, 1)));
return [Math.round(f(5) * 255), Math.round(f(3) * 255), Math.round(f(1) * 255)];
}

function confirmAdj() { document.getElementById('adjPanel').classList.add('hidden'); }
function cancelAdj() { layers[activeIdx].ctx.putImageData(origData, 0, 0); document.getElementById('adjPanel').classList.add('hidden'); renderStack(); }

init();
</script>
