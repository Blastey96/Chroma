<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chroma | Professional Painting Suite</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<!-- ag-psd library removed in favor of native .chroma format -->
<style>
:root {
--bg-main: #0a0a0a;
--bg-panel: rgba(20, 20, 20, 0.95);
--bg-canvas-container: #050505;
--text-main: #e0e0e0;
--text-dim: #9ca3af; /* gray-400 */
--text-header: #6b7280; /* gray-500 */
--border-color: rgba(255, 255, 255, 0.05);
--input-bg: #1a1a1a;
--input-border: #333;
--item-hover: rgba(255, 255, 255, 0.05);
--dot-color: #222;
}
body.light-mode {
--bg-main: #f0f0f0;
--bg-panel: rgba(235, 235, 235, 0.98);
--bg-canvas-container: #d6d6d6;
--text-main: #1a1a1a;
--text-dim: #4b5563; /* gray-600 */
--text-header: #374151; /* gray-700 */
--border-color: rgba(0, 0, 0, 0.1);
--input-bg: #ebebeb;
--input-border: #ccc;
--item-hover: rgba(0, 0, 0, 0.05);
--dot-color: #bbb;
}
body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; user-select: none; transition: background-color 0.3s ease, color 0.3s ease; }
.ui-panel { background: var(--bg-panel); backdrop-filter: blur(20px); border: 1px solid var(--border-color); }
.canvas-container { background-image: radial-gradient(var(--dot-color) 1px, transparent 1px); background-size: 20px 20px; background-color: var(--bg-canvas-container); }
#canvasStack {
position: relative;
box-shadow: 0 0 50px rgba(0,0,0,0.5);
/* Professional Checkerboard Pattern for transparency */
background-color: #ffffff;
background-image: 
    linear-gradient(45deg, #e0e0e0 25%, transparent 25%), 
    linear-gradient(-45deg, #e0e0e0 25%, transparent 25%), 
    linear-gradient(45deg, transparent 75%, #e0e0e0 75%), 
    linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
background-size: 20px 20px;
background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
cursor: none;
line-height: 0;
/* Removed transition to prevent alignment lag during zoom/rotate */
transform-origin: center center;
touch-action: none;
}
#displayCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
#activeStrokeCanvas { display: none; }
.layer-canvas { display: none; }
input[type="range"] { accent-color: #D38E3F; cursor: pointer; }
.layer-item.active { background: rgba(211, 142, 63, 0.1); border: 1px solid rgba(211, 142, 63, 0.4); }
.layer-item.dragging-visual {
background: rgba(211, 142, 63, 0.2) !important;
border: 1px solid #D38E3F !important;
opacity: 0.8;
}
.tool-btn.active { color: #D38E3F; background: rgba(211, 142, 63, 0.1); box-shadow: 0 0 15px rgba(211, 142, 63, 0.2); }
#hsvBox { background: linear-gradient(to bottom, transparent, #000), linear-gradient(to right, #fff, transparent); }
#hueBar { appearance: none; background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f0f); height: 8px; border-radius: 4px; }
#hueBar::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: white; border-radius: 50%; cursor: pointer; border: 1px solid #000; }
.draggable-panel { 
position: absolute; 
z-index: 2000; 
cursor: move; 
resize: both; 
overflow: auto; 
min-width: 220px; 
min-height: 100px; 
}
.draggable-panel * { cursor: default; }
.draggable-panel .panel-header { cursor: move; }
.draggable-panel button, .draggable-panel input, .draggable-panel select, .draggable-panel canvas, .draggable-panel .brush-grid-item { cursor: pointer; }

/* Updated Cursor Canvas to be a fixed overlay on the screen area */
#cursorCanvas { pointer-events: none; z-index: 6000; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
.clipping-indent { margin-left: 12px; border-left: 2px solid #D38E3F; padding-left: 8px; }
.hsb-track { height: 6px; border-radius: 3px; appearance: none; background: var(--input-border); margin: 8px 0; width: 100%; }
.hsb-track::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: var(--text-main); border-radius: 50%; cursor: pointer; }
select {
background: var(--input-bg);
color: var(--text-main);
border: 1px solid var(--input-border);
font-size: 10px;
padding: 4px 8px;
border-radius: 6px;
outline: none;
font-family: 'Inter', sans-serif;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 0.05em;
}
select:focus { border-color: #D38E3F; }
.layer-opacity-slider { height: 4px; width: 100%; }
/* UI overrides for light mode text */
.light-mode .text-gray-500 { color: var(--text-header); }
.light-mode .text-gray-400 { color: var(--text-dim); }
.light-mode .text-gray-600 { color: var(--text-main); }
.tool-popup {
display: none;
position: absolute;
left: 100%;
margin-left: 10px;
background: var(--bg-panel);
border: 1px solid var(--border-color);
border-radius: 12px;
padding: 8px;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
z-index: 100;
}
.tool-btn:active + .tool-popup, .tool-popup:hover {
display: flex;
flex-direction: column;
gap: 4px;
}
.color-preview-active { border-color: #D38E3F !important; box-shadow: 0 0 10px rgba(211, 142, 63, 0.4) !important; }
.brush-grid-item { aspect-ratio: 1; border: 1px solid var(--border-color); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
.brush-grid-item.active { border-color: #D38E3F; background: rgba(211, 142, 63, 0.1); }
.brush-grid-item:hover { background: var(--item-hover); }
.brush-grid-item .delete-brush { position: absolute; top: 2px; right: 2px; font-size: 8px; color: #ff4444; opacity: 0; transition: opacity 0.2s; }
.brush-grid-item:hover .delete-brush { opacity: 1; }
</style>
</head>
<body class="flex flex-col h-screen">
<!-- HEADER -->
<header class="h-14 ui-panel flex items-center px-6 justify-between z-50 border-b">
<div class="flex items-center gap-6">
<h1 class="text-[11px] font-black tracking-[0.4em] text-[#D38E3F] uppercase flex items-center gap-2">
<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="transform: rotate(45deg);">
<rect x="10.5" y="16" width="3" height="7" rx="1" />
<rect x="11.5" y="10" width="1" height="6" />
<path d="M12 1L8 6L12 11L16 6Z" />
</svg>
CHROMA
</h1>
<!-- File Operations Icons (Updated for .chroma format) -->
<div class="flex items-center gap-1 border-l border-white/10 pl-4 h-8">
<button onclick="triggerChromaImport()" class="p-2 text-gray-400 hover:text-purple-400 transition-colors" title="Open Chroma Project">
<i class="fas fa-folder-open"></i>
</button>
<div class="relative flex flex-col items-center">
    <button id="btn-save" class="p-2 text-gray-400 hover:text-blue-400 transition-colors" 
    onpointerdown="startToolHold('save')" onpointerup="endToolHold('save')"
    onclick="saveChromaFile()" title="Save (Ctrl+S) / Hold for Save As">
    <i class="fas fa-save"></i>
    </button>
    <!-- Header Dropdown for Save Options -->
    <div id="save-popup" class="tool-popup hidden" style="left: 50%; transform: translateX(-50%); top: 100%; margin-left: 0; margin-top: 5px; width: 120px;">
        <button onclick="saveChromaFile()" class="p-2 hover:bg-[#D38E3F]/10 rounded text-gray-400 hover:text-[#D38E3F] flex items-center gap-2 text-[9px] font-bold uppercase w-full"><i class="fas fa-save"></i> Save</button>
        <button onclick="saveAsChromaFile()" class="p-2 hover:bg-[#D38E3F]/10 rounded text-gray-400 hover:text-[#D38E3F] flex items-center gap-2 text-[9px] font-bold uppercase w-full"><i class="fas fa-file-export"></i> Save As...</button>
    </div>
</div>
<button onclick="exportCanvas()" class="p-2 text-gray-400 hover:text-[#D38E3F] transition-colors" title="Export PNG">
<i class="fas fa-file-export"></i>
</button>
</div>
<div class="flex items-center gap-1 border-l border-white/10 pl-4 h-8">
<button onclick="undo()" class="p-2 text-gray-400 hover:text-[#D38E3F] transition-colors" title="Undo (Ctrl+Z)">
<i class="fas fa-undo-alt"></i>
</button>
<button onclick="redo()" class="p-2 text-gray-400 hover:text-[#D38E3F] transition-colors" title="Redo (Ctrl+Shift+Z)">
<i class="fas fa-redo-alt"></i>
</button>
</div>
<!-- Global Selection Control (Appears whenever a selection is active) -->
<div id="selectionGlobalUI" class="hidden items-center gap-3 border-l border-white/10 pl-6 h-8">
<button onclick="clearSelection()" class="bg-[#D38E3F]/10 hover:bg-[#D38E3F]/20 text-[#D38E3F] border border-[#D38E3F]/30 px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-all">
Deselect
</button>
</div>
<!-- Gradient Specific Options (Hidden by default) -->
<div id="gradientOptions" class="hidden items-center gap-3 border-l border-white/10 pl-6 h-8">
<div class="flex flex-col">
<span class="text-[8px] uppercase text-gray-500 font-bold mb-0.5">Gradient Type</span>
<select id="gradientTypeSelect" onchange="gradientType = this.value">
<option value="fg-bg">Foreground to Background</option>
<option value="bg-fg">Background to Foreground</option>
<option value="fg-trans">Foreground to Transparent</option>
<option value="bg-trans">Background to Transparent</option>
</select>
</div>
</div>
<!-- Lasso Specific Options (Hidden by default) -->
<div id="lassoOptions" class="hidden items-center gap-3 border-l border-white/10 pl-6 h-8">
<div class="flex flex-col w-28">
<div class="flex justify-between text-[8px] uppercase text-gray-500 font-bold mb-0.5">
<span>Feather</span><span id="lassoFeatherVal">0px</span>
</div>
<input type="range" id="lassoFeatherSlider" min="0" max="100" value="0" oninput="updateLassoFeather(this.value)">
</div>
</div>
<div class="flex items-center gap-4 border-l border-white/10 pl-6 h-8">
<div class="flex items-center gap-1 bg-black/5 dark:bg-white/5 rounded-lg p-1">
<button onclick="changeZoom(-0.1)" class="w-8 h-6 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 rounded"><i class="fas fa-minus text-[10px]"></i></button>
<span id="zoomVal" class="text-[10px] font-mono w-10 text-center">100%</span>
<button onclick="changeZoom(0.1)" class="w-8 h-6 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 rounded"><i class="fas fa-plus text-[10px]"></i></button>
</div>
<div class="flex items-center gap-1 bg-black/5 dark:bg-white/5 rounded-lg p-1">
<button onclick="changeRotate(-15)" class="w-8 h-6 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 rounded"><i class="fas fa-undo text-[10px]"></i></button>
<span id="rotateVal" class="text-[10px] font-mono w-10 text-center">0°</span>
<button onclick="changeRotate(15)" class="w-8 h-6 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 rounded"><i class="fas fa-redo text-[10px]"></i></button>
</div>
<button onclick="toggleFlip()" class="bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 w-8 h-8 rounded-lg flex items-center justify-center transition-all">
<i class="fas fa-arrows-alt-h text-[12px]"></i>
</button>
</div>
<div class="flex items-center gap-6 border-l border-white/10 pl-6">
<div class="flex flex-col w-32">
<div class="flex justify-between items-center text-[9px] uppercase text-gray-500 font-bold mb-1">
<div class="flex items-center gap-2">
<span>Size</span>
<button id="btn-pressure-size" onclick="togglePressureSize()" class="text-[10px] text-gray-500 hover:text-[#D38E3F] transition-colors" title="Toggle Pen Pressure Size">
<i class="fas fa-compress-arrows-alt"></i>
</button>
</div>
<span id="sizeVal">30px</span>
</div>
<input type="range" id="sizeSlider" min="1" max="300" value="30">
</div>
<div class="flex flex-col w-36">
<div class="flex justify-between items-center text-[9px] uppercase text-gray-500 font-bold mb-1">
<div class="flex items-center gap-2">
<span>Brush Opacity</span>
<button id="btn-pressure" onclick="togglePressure()" class="text-[10px] text-gray-500 hover:text-[#D38E3F] transition-colors" title="Toggle Pen Pressure Opacity">
<i class="fas fa-fingerprint"></i>
</button>
</div>
<span id="opacityVal">100%</span>
</div>
<input type="range" id="opacitySlider" min="1" max="100" value="100">
</div>
</div>
</div>
<div class="flex items-center gap-3">
<button id="themeToggle" onclick="toggleTheme()" class="p-2 text-gray-400 hover:text-[#D38E3F] transition-colors" title="Toggle Light/Dark Mode">
<i class="fas fa-moon"></i>
</button>
<input type="file" id="chromaInput" class="hidden" accept=".chroma" onchange="handleChromaImport(event)">
</div>
</header>
<div class="flex flex-1 overflow-hidden relative">
<aside class="w-16 ui-panel flex flex-col items-center py-6 gap-6 border-r z-40">
<button id="btn-brush" class="tool-btn active p-3 rounded-xl transition-all" onclick="setMode('brush')" title="Brush (B)">
<i class="fas fa-paint-brush"></i>
</button>
<div class="relative flex flex-col items-center">
<button id="btn-bucket" class="tool-btn p-3 rounded-xl transition-all text-gray-500"
onpointerdown="startToolHold('bucket')" onpointerup="endToolHold('bucket')"
onclick="setMode(lastBucketTool)" title="Paint Bucket / Gradient (G)">
<i id="bucket-icon" class="fas fa-fill-drip"></i>
</button>
<!-- Hidden Switch Popup -->
<div id="bucket-popup" class="tool-popup hidden">
<button onclick="setMode('bucket')" class="p-2 hover:bg-[#D38E3F]/10 rounded text-gray-400 hover:text-[#D38E3F]"><i class="fas fa-fill-drip"></i></button>
<button onclick="setMode('gradient')" class="p-2 hover:bg-[#D38E3F]/10 rounded text-gray-400 hover:text-[#D38E3F]"><i class="fas fa-stream"></i></button>
</div>
</div>
<button id="btn-lasso" class="tool-btn p-3 rounded-xl transition-all text-gray-500" onclick="setMode('lasso')" title="Lasso Selection (L)">
<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
<path d="M12,2A10,10,0,0,0,2,12a10,10,0,0,0,10,10,10,10,0,0,0,10-10A10,10,0,0,0,12,2Zm0,18a8,8,0,1,1,8-8A8,8,0,0,1,12,20Zm4.5-9a1.5,1.5,0,1,1-1.5,1.5A1.5,1.5,0,0,1,16.5,11Zm-9,0a1.5,1.5,0,1,1-1.5,1.5A1.5,1.5,0,0,1,7.5,11Zm4.5,5a1.5,1.5,0,1,1,0-3,1.5,1.5,0,0,1,0,3Z" opacity="0.3"/>
<path d="M12,5c-3.86,0-7,3.14-7,7s3.14,7,7,7,7-3.14,7-7S15.86,5,12,5Zm4,7a2,2,0,1,1-2-2A2,2,0,0,1,16,12Zm-8,0a2,2,0,1,1-2-2A2,2,0,0,1,8,12Z"/>
</svg>
</button>
<button id="btn-eraser" class="tool-btn p-3 rounded-xl transition-all text-gray-500" onclick="setMode('eraser')" title="Eraser (E)">
<i class="fas fa-eraser"></i>
</button>
<button id="btn-smudge" class="tool-btn p-3 rounded-xl transition-all text-gray-500" onclick="setMode('smudge')" title="Smudge (S)">
<i class="fas fa-wind"></i>
</button>
<div class="w-8 h-px bg-black/10 dark:bg-white/10"></div>
<button id="btn-brush-library" class="tool-btn p-3 rounded-xl transition-all text-gray-500" onclick="toggleBrushLibrary()" title="Brush Library">
<i class="fas fa-toolbox"></i>
</button>
<button id="btn-brush-settings" class="tool-btn p-1.5 rounded-md text-[10px] text-gray-500" onclick="toggleBrushSettings()" title="Brush Settings">
<i class="fas fa-cog"></i>
</button>
<div class="w-8 h-px bg-black/10 dark:bg-white/10"></div>
<!-- Overlapping Primary/Secondary Colors -->
<div class="relative w-8 h-10">
<div id="secondaryColorPreview" onclick="setActiveColorTarget('secondary')" class="absolute right-0 bottom-0 w-6 h-6 rounded-md border border-white/10 cursor-pointer shadow-lg z-10" style="background-color: #ffffff;" title="Secondary Color (Click to edit)"></div>
<div id="activeColorPreview" onclick="setActiveColorTarget('primary')" class="absolute left-0 top-0 w-6 h-6 rounded-md border-2 border-white/20 shadow-xl z-20 color-preview-active" style="background-color: #D38E3F;" title="Primary Color (Click to edit)"></div>
</div>
</aside>
<main id="viewport" class="flex-1 relative canvas-container flex items-center justify-center overflow-hidden">
<div id="canvasStack" style="width: 800px; height: 800px;">
<canvas id="displayCanvas"></canvas>
<canvas id="activeStrokeCanvas"></canvas>
</div>
<!-- Cursor Canvas moved to a HUD level inside the main viewport area -->
<canvas id="cursorCanvas"></canvas>
</main>
<aside class="w-80 ui-panel flex flex-col border-l z-40">
<div class="p-5 border-b">
<div class="relative mb-4">
    <div class="border border-white/10 rounded-xl hover:border-[#D38E3F]/40 transition-all">
        <select id="rightPanelModeSelect" onchange="toggleRightPanelMode(this.value)" class="w-full bg-transparent border-none text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] cursor-pointer outline-none appearance-none py-3 px-4 pr-10">
            <option value="adjustments" class="bg-zinc-900 text-white">Adjustments</option>
            <option value="edit" class="bg-zinc-900 text-white">Edit</option>
        </select>
        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-500 text-[8px]">
            <i class="fas fa-chevron-down"></i>
        </div>
    </div>
</div>
<div id="adjustmentsPanelContainer" class="grid grid-cols-2 gap-2">
<button onclick="applyAdjustment('hsb')" class="bg-black/5 dark:bg-white/5 p-3 rounded-xl border border-transparent hover:border-[#D38E3F] text-[9px] font-bold uppercase transition-all">Hue/Sat/Bri</button>
<button onclick="applyAdjustment('balance')" class="bg-black/5 dark:bg-white/5 p-3 rounded-xl border border-transparent hover:border-[#D38E3F] text-[9px] font-bold uppercase transition-all">Color Bal</button>
</div>
<div id="editPanelContainer" class="hidden grid grid-cols-2 gap-2">
    <button onclick="toggleTransform()" class="bg-black/5 dark:bg-white/5 p-3 rounded-xl border border-transparent hover:border-[#D38E3F] text-[9px] font-bold uppercase transition-all">Transform</button>
    <button onclick="createNewBrushFromLayer()" class="bg-black/5 dark:bg-white/5 p-3 rounded-xl border border-transparent hover:border-[#D38E3F] text-[9px] font-bold uppercase transition-all">New Brush</button>
</div>
</div>
<div class="flex-1 flex flex-col min-h-0">
<div class="p-5 flex items-center justify-between">
<h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">Layers</h3>
<div class="flex gap-3 items-center">
<button onclick="addLayer()" class="text-gray-400 hover:text-[#D38E3F] transition-colors" title="New Layer (Ctrl+N)">
<i class="fas fa-plus-square"></i>
</button>
<button onclick="duplicateLayer()" class="text-gray-400 hover:text-[#D38E3F] transition-colors" title="Duplicate Layer (Ctrl+J)">
<i class="fas fa-copy"></i>
</button>
<button onclick="mergeDown()" class="text-gray-400 hover:text-[#D38E3F] transition-colors" title="Merge Down (Ctrl+E)">
<i class="fas fa-level-down-alt"></i>
</button>
<button onclick="triggerImageImport()" class="text-gray-400 hover:text-[#D38E3F] transition-colors" title="Import Image">
<i class="fas fa-file-import"></i>
</button>
<input type="file" id="imageInput" class="hidden" accept="image/*" onchange="handleImageImport(event)">
</div>
</div>
<div id="layerList" class="px-3 space-y-1 overflow-y-auto flex-1 pb-4"></div>
</div>
</aside>

<!-- FLOATING DRAGGABLE PANELS (Root Context) -->
<div id="brushLibraryPanel" class="draggable-panel hidden right-[340px] top-[450px] w-64 ui-panel rounded-3xl p-5 shadow-2xl border flex flex-col">
    <div class="panel-header flex justify-between items-center mb-4 text-[9px] font-bold uppercase text-[#D38E3F] tracking-wider">
        <span>Brush Library</span>
        <i class="fas fa-grip-lines"></i>
    </div>
    <div id="brushLibraryGrid" class="grid grid-cols-4 gap-2 max-h-[40vh] overflow-y-auto pr-1 flex-1"></div>
    <div class="flex gap-2 mt-4 flex-shrink-0">
        <button onclick="exportBrushes()" class="flex-1 py-1.5 bg-black/20 hover:bg-black/40 text-[8px] font-black uppercase rounded-lg border border-white/5 transition-all" title="Export whole library as one set">Export Library</button>
        <button onclick="triggerBrushImport()" class="flex-1 py-1.5 bg-black/20 hover:bg-black/40 text-[8px] font-black uppercase rounded-lg border border-white/5 transition-all" title="Import .chromabrushes files">Import Brushes</button>
        <input type="file" id="brushImportInput" class="hidden" accept=".chromabrushes" multiple onchange="importBrushes(event)">
    </div>
    <button onclick="toggleBrushLibrary()" class="mt-2 w-full py-2 bg-[#D38E3F] text-white text-[9px] font-bold uppercase rounded-lg">Close</button>
</div>

<div id="brushSettingsPanel" class="draggable-panel hidden right-[340px] top-[150px] w-72 ui-panel rounded-3xl p-5 shadow-2xl border">
    <div class="panel-header flex justify-between items-center mb-4 text-[9px] font-bold uppercase text-[#D38E3F] tracking-wider">
        <span>Brush Settings</span>
        <i class="fas fa-grip-lines"></i>
    </div>
    <div class="w-full h-20 bg-black/20 rounded-xl mb-4 overflow-hidden flex items-center justify-center flex-shrink-0">
        <canvas id="brushPreviewCanvas" width="260" height="80"></canvas>
    </div>
    <div class="space-y-4 pr-2">
        <div>
            <div class="flex justify-between text-[8px] uppercase font-bold text-gray-500"><span>Spacing</span><span id="bs-spacing-val">1%</span></div>
            <input type="range" id="bs-spacing" min="1" max="100" value="1" class="hsb-track">
        </div>
        <div>
            <div class="flex justify-between text-[8px] uppercase font-bold text-gray-500"><span>Hardness</span><span id="bs-hardness-val">100%</span></div>
            <input type="range" id="bs-hardness" min="0" max="100" value="100" class="hsb-track">

function updateBrushPreview() {
const pc = document.getElementById('brushPreviewCanvas');
if (!pc) return;
const pctx = pc.getContext('2d');
pctx.clearRect(0, 0, pc.width, pc.height);
const margin = 25;
const startX = margin;
const endX = pc.width - margin;
const centerY = pc.height / 2;
const drawColor = (mode === 'eraser' || isBacktickDown) ? 'rgb(255,255,255)' : color;
let previewDist = 0;
let lx = startX, ly = centerY;
const steps = 150;
for (let i = 0; i <= steps; i++) {
const ratio = i / steps;
const x = startX + (endX - startX) * ratio;
const y = centerY + Math.sin(ratio * Math.PI * 4) * 8;
const segmentDist = Math.hypot(x - lx, y - ly);
previewDist += segmentDist;
const pressureSim = 0.1 + 0.9 * ratio;
let pSize = brushSize;
if (pSize > 40) pSize = 40 + (pSize - 40) * 0.2;
if (usePressureSize) pSize *= pressureSim;
const spacingPx = Math.max(0.5, pSize * brushSettings.spacing);
if (previewDist >= spacingPx || i === 0) {
let pOp = opacity;
if (usePressure) pOp *= pressureSim;
let rx = x, ry = y;
if (brushSettings.scatter > 0) {
rx += (Math.random() - 0.5) * brushSettings.scatter * pSize;
ry += (Math.random() - 0.5) * brushSettings.scatter * pSize;
}
renderDab(pctx, rx, ry, pSize, drawColor, brushSettings.hardness, pOp * brushSettings.flow);
previewDist = 0;
}
lx = x; ly = y;
}
}

function triggerChromaImport() {
if ('showOpenFilePicker' in window) {
    window.showOpenFilePicker({
        types: [{ description: 'Chroma Project', accept: { 'application/json': ['.chroma'] } }]
    }).then(([handle]) => {
        currentFileHandle = handle;
        return handle.getFile();
    }).then(file => file.text())
    .then(text => processChromaData(text))
    .catch(e => console.log("Import cancelled"));
} else {
    document.getElementById('chromaInput').click();
}
}
async function processChromaData(text) {
try {
const project = JSON.parse(text);
if (project.format !== 'chroma') throw new Error("Invalid Chroma file");
saveUndo();
layers = [];
for (const lData of project.layers) {
const canvas = document.createElement('canvas');
canvas.width = canvas.height = INTERNAL_RES;
const ctx = canvas.getContext('2d');
await new Promise(resolve => {
const img = new Image();
img.onload = () => {
ctx.drawImage(img, 0, 0);
resolve();
};
img.src = lData.pixelData;
});
layers.push({
id: lData.id || Date.now() + Math.random(),
name: lData.name,
canvas, ctx,
visible: lData.visible,
alphaLocked: lData.alphaLocked,
clippingMask: lData.clippingMask,
blendMode: lData.blendMode,
opacity: lData.opacity
});
}
activeIdx = 0;
refreshUI();
renderStack();
} catch (err) {
console.error("Chroma Load Error:", err);
showToast("Failed to open Chroma project. File may be corrupted.");
}
}
async function handleChromaImport(e) {
const file = e.target.files[0];
if (!file) return;
const reader = new FileReader();
reader.onload = async (event) => {
    processChromaData(event.target.result);
    currentFileHandle = null;
};
reader.readAsText(file);
e.target.value = '';
}
function generateChromaProjectObject() {
return {
format: 'chroma',
version: '1.0',
width: INTERNAL_RES,
height: INTERNAL_RES,
layers: layers.map(l => ({
id: l.id,
name: l.name,
visible: l.visible,
opacity: l.opacity,
blendMode: l.blendMode,
alphaLocked: l.alphaLocked,
clippingMask: l.clippingMask,
pixelData: l.canvas.toDataURL('image/png')
}))
};
}
async function saveChromaFile() {
if (currentFileHandle) {
    try {
        const project = generateChromaProjectObject();
        const writable = await currentFileHandle.createWritable();
        await writable.write(JSON.stringify(project));
        await writable.close();
        showToast("Project Saved Successfully");
        return;
    } catch (e) { console.error("Save failed", e); }
}
saveAsChromaFile();
}
async function saveAsChromaFile() {
const project = generateChromaProjectObject();
if ('showSaveFilePicker' in window) {
    try {
        const handle = await window.showSaveFilePicker({
            suggestedName: 'project.chroma',
            types: [{ description: 'Chroma Project', accept: { 'application/json': ['.chroma'] } }]
        });

        await writable.write(JSON.stringify(project));
        await writable.close();
        showToast("Project Saved As New File");
    } catch (e) { console.log("Save cancelled"); }
} else {
    const blob = new Blob([JSON.stringify(project)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'project.chroma';

}

function setupBrushEngineUI() {
const bind = (id, key, multiplier = 1, isPercent = true) => {

const label = document.getElementById(id + '-val');
slider.oninput = (e) => {

};
bind('bs-spacing', 'spacing', 100);
bind('bs-hardness', 'hardness', 100);
bind('bs-flow', 'flow', 100);

function renderBrushLibrary() {
    const grid = document.getElementById('brushLibraryGrid');
    grid.innerHTML = '';
    brushLibrary.forEach(brush => {
        const item = document.createElement('div');
        const isActive = brushTip === brush.id;
        item.className = `brush-grid-item ${isActive ? 'active' : ''}`;

        if (brush.type === 'round') {
            item.innerHTML = `<div class="w-6 h-6 rounded-full bg-white/50 border border-white/20"></div>`;
        } else if (brush.type === 'flat') {
            item.innerHTML = `<div class="w-6 h-2 bg-white/50 border border-white/20"></div>`;
        } else if (brush.type === 'custom') {
            const img = new Image();
            img.src = brush.mask;
            img.className = "w-8 h-8 object-contain opacity-70";

            const del = document.createElement('button');

            del.onclick = (e) => {
                e.stopPropagation();
                brushLibrary = brushLibrary.filter(b => b.id !== brush.id);
                if (brushTip === brush.id) brushTip = 'round';
                renderBrushLibrary();
                updateBrushPreview();
            };
            item.appendChild(del);
        }
        
        item.onclick = () => {
            brushTip = brush.id;
            updateBrushTint(); // Optimization: pre-tint
            renderBrushLibrary();
            updateBrushPreview();
        };
        grid.appendChild(item);
    });

function exportBrushes() {

async function importBrushes(e) {
    const files = Array.from(e.target.files);
    if (files.length === 0) return;
    
    let totalImported = 0;
    for (const file of files) {
        const text = await file.text();
        try {
            const imported = JSON.parse(text);
            const brushes = Array.isArray(imported) ? imported : [imported];
            for (const brushData of brushes) {
                if (brushData.id === 'round' || brushData.id === 'flat') continue;
                
                await new Promise(resolve => {
                    const brushCanvas = document.createElement('canvas');
                    brushCanvas.width = brushCanvas.height = 256;
                    const bctx = brushCanvas.getContext('2d');
                    const img = new Image();
                    img.onload = () => {
                        bctx.drawImage(img, 0, 0);
                        brushLibrary.push({ ...brushData, canvas: brushCanvas });
                        totalImported++;
                        resolve();
                    };
                    img.src = brushData.mask;
                });
            }
        } catch (err) { console.error("Parse error for", file.name); }
    }
    renderBrushLibrary();
    showToast(`Imported ${totalImported} brushes`);
    e.target.value = '';
}

// Pre-tints custom brush for performance
function updateBrushTint() {
    const brush = brushLibrary.find(b => b.id === brushTip);
    if (!brush || brush.type !== 'custom') {
        customBrushTintedCanvas = null;
        return;
    }
    const colorStr = (mode === 'eraser' || isBacktickDown) ? 'rgb(255,255,255)' : color;
    const off = document.createElement('canvas');
    off.width = off.height = 256;
    const octx = off.getContext('2d');
    octx.fillStyle = colorStr;
    octx.fillRect(0, 0, 256, 256);
    octx.globalCompositeOperation = 'destination-in';
    octx.drawImage(brush.canvas, 0, 0, 256, 256);
    customBrushTintedCanvas = off;
}

function createNewBrushFromLayer() {
    const layer = layers[activeIdx];
    if (!layer) return;
    
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = INTERNAL_RES;
    tempCanvas.height = INTERNAL_RES;
    const tctx = tempCanvas.getContext('2d');
    tctx.drawImage(layer.canvas, 0, 0);
    
    const imgData = tctx.getImageData(0, 0, INTERNAL_RES, INTERNAL_RES);
    let minX = INTERNAL_RES, minY = INTERNAL_RES, maxX = 0, maxY = 0;
    let found = false;
    let anyTransparency = false;

    for (let y = 0; y < INTERNAL_RES; y++) {
        for (let x = 0; x < INTERNAL_RES; x++) {
            const alpha = imgData.data[(y * INTERNAL_RES + x) * 4 + 3];
            if (alpha < 255) anyTransparency = true;
            if (alpha > 0) {
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
                found = true;
            }
        }
    }
    
    if (!found) {
        showToast("Layer is empty. Paint something to make a brush!");
        return;
    }
    
    const w = maxX - minX + 1;
    const h = maxY - minY + 1;
    const size = Math.max(w, h);
    const brushCanvas = document.createElement('canvas');
    brushCanvas.width = brushCanvas.height = 256;
    const bctx = brushCanvas.getContext('2d');

function createSlider(l, min, max, v, id) {
const d = document.createElement('div'); d.innerHTML = `<div class="flex justify-between mb-2 text-[9px] uppercase text-gray-500 font-bold"><span>${l}</span><span id="val-${id}">0</span></div><input type="range" id="adj-${id}" min="${min}" max="${max}" value="${v}" class="w-full">`;
document.getElementById('adjControls').appendChild(d); d.querySelector('input').oninput = (e) => { document.getElementById(`val-${id}`).innerText = e.target.value; runAdj(); };
}
function runAdj() {
const data = new ImageData(new Uint8ClampedArray(origData.data), INTERNAL_RES, INTERNAL_RES);
const p = data.data, isHSL = !!document.getElementById('adj-h');
const hS = parseInt(document.getElementById('adj-h')?.value || 0), sS = parseInt(document.getElementById('adj-s')?.value || 0), vS = parseInt(document.getElementById('adj-v')?.value || 0);
const rS = parseInt(document.getElementById('adj-r')?.value || 0), gS = parseInt(document.getElementById('adj-g')?.value || 0), blS = parseInt(document.getElementById('adj-bl')?.value || 0);
for(let i=0; i<p.length; i+=4) {
if (p[i+3] === 0) continue;
if (isHSL) { let [h, s, v] = rgbToHsvRaw(p[i], p[i+1], p[i+2]); h = (h + hS + 360) % 360; s = Math.max(0, Math.min(100, s + sS)); v = Math.max(0, Math.min(100, v + vS)); const [nr, ng, nb] = hsvToRgb(h, s, v); p[i] = nr; p[i+1] = ng; p[i+2] = nb; }
else { p[i] = Math.max(0, Math.min(255, p[i] + rS)); p[i+1] = Math.max(0, Math.min(255, p[i+1] + gS)); p[i+2] = Math.max(0, Math.min(255, p[i+2] + blS)); }
}
layers[activeIdx].ctx.putImageData(data, 0, 0); renderStack();
}
function hsvToRgb(h, s, v) {
h /= 360; s /= 100; v /= 100; const f = n => v * (1 - s * Math.max(0, Math.min((n + h * 6) % 6, 4 - (n + h * 6) % 6, 1)));
return [Math.round(f(5) * 255), Math.round(f(3) * 255), Math.round(f(1) * 255)];
}
function confirmAdj() { document.getElementById('adjPanel').classList.add('hidden'); }
function cancelAdj() { layers[activeIdx].ctx.putImageData(origData, 0, 0); document.getElementById('adjPanel').classList.add('hidden'); renderStack(); }
init();
</script>
</body>
